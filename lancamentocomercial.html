<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lançamento Comercial - Comando Zape</title>
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1A1A1A; color: #fff; font-family: 'Albert Sans', sans-serif; }
    
    .container { max-width: 1400px; margin: 0 auto; padding: 32px; }
    
    header { margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid #383838; }
    header h1 { font-size: 28px; font-weight: 900; }
    
    .card { background: #2A2A2A; padding: 20px; margin-bottom: 24px; border-radius: 8px; border: 1px solid #383838; }
    .card-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #fff; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
    .card-title:hover { color: #B2FF00; }
    .expand-icon { display: inline-block; transition: transform 0.3s; font-size: 12px; }
    .expand-icon.open { transform: rotate(180deg); }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; }
    .form-group input, .form-group select { width: 100%; padding: 10px; background: #1A1A1A; border: 1px solid #383838; color: #fff; border-radius: 6px; font-family: inherit; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #B2FF00; box-shadow: 0 0 8px rgba(178,255,0,0.2); }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
    
    .btn { background: #B2FF00; color: #1A1A1A; padding: 12px 24px; border: none; border-radius: 6px; font-weight: 900; font-size: 14px; cursor: pointer; margin-top: 16px; transition: all 0.3s; }
    .btn:hover { opacity: 0.9; }
    
    .success { color: #4CAF50; padding: 12px; border-radius: 6px; margin-bottom: 16px; display: none; }
    .success.show { display: block; }
    
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    table th { padding: 12px; text-align: left; font-weight: 700; color: #B2FF00; border-bottom: 1px solid #383838; }
    table td { padding: 12px; border-bottom: 1px solid #383838; }
    table tr:hover { background: rgba(178,255,0,0.03); }
    
    .expandable-row { cursor: pointer; }
    .expandable-row:hover { background: rgba(178,255,0,0.05); }
    
    .expand-cell { width: 30px; }
    .expand-cell-icon { display: inline-block; transition: transform 0.3s; }
    .expand-cell-icon.open { transform: rotate(180deg); }
    
    .detail-row { background: rgba(0,0,0,0.2); display: none; }
    .detail-row.show { display: table-row; }
    .detail-content { padding: 20px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .detail-label { font-size: 10px; color: #999; text-transform: uppercase; margin-bottom: 4px; }
    .detail-value { font-size: 12px; color: #fff; }
    
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .edit-btn { background: #2196F3; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 700; }
    .edit-btn:hover { background: #1976D2; }
    .delete-btn { background: #F44336; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 700; }
    .delete-btn:hover { opacity: 0.8; }
    
    .dynamic-fields { background: #1A1A1A; padding: 16px; border-radius: 6px; margin-bottom: 16px; }
    .dynamic-field { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-bottom: 12px; align-items: flex-end; }
    .dynamic-field select, .dynamic-field input { margin: 0; }
    .remove-btn { background: #F44336; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 700; }
    .remove-btn:hover { opacity: 0.8; }
    
    .add-btn { background: #383838; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 700; margin-top: 8px; }
    .add-btn:hover { background: #B2FF00; color: #1A1A1A; }
    
    .collapsible-content { display: none; }
    .collapsible-content.show { display: block; }
    
    .filter-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #383838; }
    .filter-section .form-group { margin-bottom: 0; }
    
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); }
    .modal.show { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: #2A2A2A; border: 1px solid #383838; padding: 32px; border-radius: 12px; width: 90%; max-width: 700px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-header h2 { font-size: 18px; font-weight: 700; }
    .modal-close { background: none; border: none; color: #999; font-size: 24px; cursor: pointer; }
    .modal-close:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Lançamento Comercial</h1>
    </header>

    <!-- Formulário de Registro -->
    <div class="card">
      <div class="card-title">Registrar Movimentação Comercial</div>
      <div class="success" id="success-msg">Registro salvo com sucesso!</div>
      
      <form onsubmit="registerMovement(event)">
        <div class="form-row">
          <div class="form-group">
            <label>Nome Closer</label>
            <select name="closer" id="closer-select" required>
              <option value="">Carregando...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Data</label>
            <input type="date" name="data" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Origem</label>
            <select name="origem" id="origem-select" required>
              <option value="">Carregando...</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Agendamentos Realizados</label>
          <div class="dynamic-fields" id="agendamentos-container">
            <div class="dynamic-field">
              <select class="sdr-select" required>
                <option value="">Carregando SDRs...</option>
              </select>
              <input type="number" class="quantidade" placeholder="Quantidade" min="1" required>
              <button type="button" class="remove-btn" onclick="removeField(this)">Remover</button>
            </div>
          </div>
          <button type="button" class="add-btn" onclick="addAgendamento()">+ Adicionar SDR</button>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Reuniões Comparecidas</label>
            <select name="reunioes" required>
              <option value="">Selecione...</option>
              <option value="1">1</option><option value="2">2</option><option value="3">3</option>
              <option value="4">4</option><option value="5">5</option><option value="6">6</option>
              <option value="7">7</option><option value="8">8</option><option value="9">9</option>
              <option value="10">10</option>
            </select>
          </div>

          <div style="grid-column: span 1;">
            <div class="form-group" style="margin-bottom: 0;">
              <label>Reagendamentos</label>
            </div>
            <div class="dynamic-fields" id="reagendamentos-container" style="margin-bottom: 0;">
              <div class="dynamic-field">
                <select class="sdr-select" required>
                  <option value="">Carregando SDRs...</option>
                </select>
                <input type="number" class="quantidade" placeholder="Quantidade" min="1" required>
                <button type="button" class="remove-btn" onclick="removeField(this)">Remover</button>
              </div>
            </div>
          </div>
        </div>

        <button type="button" class="add-btn" onclick="addReagendamento()">+ Adicionar SDR (Reagendamentos)</button>

        <div class="form-row">
          <div class="form-group">
            <label>Quantidade Ganho</label>
            <select name="quantidade-ganho" required>
              <option value="">Selecione...</option>
              <option value="1">1</option><option value="2">2</option><option value="3">3</option>
              <option value="4">4</option><option value="5">5</option><option value="6">6</option>
              <option value="7">7</option><option value="8">8</option><option value="9">9</option>
              <option value="10">10</option>
            </select>
          </div>
          <div class="form-group">
            <label>Valor Ganho (R$)</label>
            <input type="number" name="valor-ganho" placeholder="0,00" step="0.01" required>
          </div>
        </div>

        <button type="submit" class="btn">Registrar Movimentação</button>
      </form>
    </div>

    <!-- HISTÓRICO -->
    <div class="card">
      <div class="card-title" onclick="toggleHistorico()">
        <span>Histórico de Movimentações</span>
        <span class="expand-icon" id="historico-icon">▼</span>
      </div>
      
      <div class="collapsible-content show" id="historico-content">
        <div class="filter-section">
          <div class="form-group">
            <label>Filtrar por Closer</label>
            <select id="filter-closer" onchange="applyFilters()">
              <option value="">Todos</option>
            </select>
          </div>
          <div class="form-group">
            <label>Filtrar por Data</label>
            <input type="date" id="filter-date" onchange="applyFilters()">
          </div>
          <div class="form-group">
            <label>&nbsp;</label>
            <button class="btn" onclick="clearFilters()" style="margin: 0; width: 100%;">Limpar Filtros</button>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th style="width: 30px;"></th>
              <th>Data</th>
              <th>Closer</th>
              <th>Origem</th>
              <th>Agendamentos</th>
              <th>Reuniões</th>
              <th>Reagendamentos</th>
              <th>Qtd. Ganho</th>
              <th>Valor Ganho</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="records-table">
            <tr><td colspan="10" style="text-align:center;color:#999;">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- MODAL DE EDIÇÃO -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Editar Movimentação</h2>
        <button class="modal-close" onclick="closeEditModal()">×</button>
      </div>
      <form onsubmit="saveEdit(event)">
        <div class="form-row">
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="edit-data" required>
          </div>
          <div class="form-group">
            <label>Reuniões Comparecidas</label>
            <select id="edit-reunioes" required>
              <option value="">Selecione...</option>
              <option value="1">1</option><option value="2">2</option><option value="3">3</option>
              <option value="4">4</option><option value="5">5</option><option value="6">6</option>
              <option value="7">7</option><option value="8">8</option><option value="9">9</option>
              <option value="10">10</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Quantidade Ganho</label>
            <select id="edit-quantidade-ganho" required>
              <option value="">Selecione...</option>
              <option value="1">1</option><option value="2">2</option><option value="3">3</option>
              <option value="4">4</option><option value="5">5</option><option value="6">6</option>
              <option value="7">7</option><option value="8">8</option><option value="9">9</option>
              <option value="10">10</option>
            </select>
          </div>
          <div class="form-group">
            <label>Valor Ganho (R$)</label>
            <input type="number" id="edit-valor-ganho" placeholder="0,00" step="0.01" required>
          </div>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Salvar Alterações</button>
      </form>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://mrchphqqgbssndijichd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yY2hwaHFxZ2Jzc25kaWppY2hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTM3NzQsImV4cCI6MjA4ODQ4OTc3NH0.27BBzargnQ1jLuZNdlrohOxl8VqNtZLiwZqJcT4xpoA';

    async function supabaseFetch(table, method = 'GET', data = null) {
      const url = `${SUPABASE_URL}/rest/v1/${table}`;
      const options = {
        method,
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        }
      };
      if (data) options.body = JSON.stringify(data);
      try {
        const response = await fetch(url, options);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (err) {
        console.error(`Supabase error:`, err);
        return [];
      }
    }

    let closers = [];
    let sdrs = [];
    let origens = [];
    let movements = JSON.parse(localStorage.getItem('movements')) || [];
    let editingMovement = null;
    let historicoExpanded = true;

    async function loadData() {
      closers = await supabaseFetch('closers?order=name');
      sdrs = await supabaseFetch('sdrs?order=name');
      origens = await supabaseFetch('origens?order=name');
      populateSelects();
      renderTable();
    }

    function populateSelects() {
      const closerSelect = document.getElementById('closer-select');
      closerSelect.innerHTML = '<option value="">Selecione...</option>' + closers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

      const filterCloser = document.getElementById('filter-closer');
      filterCloser.innerHTML = '<option value="">Todos</option>' + closers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

      const origemSelect = document.getElementById('origem-select');
      origemSelect.innerHTML = '<option value="">Selecione...</option>' + origens.map(o => `<option value="${o.id}">${o.name}</option>`).join('');

      document.querySelectorAll('.sdr-select').forEach(sel => {
        const current = sel.value;
        sel.innerHTML = '<option value="">Selecione SDR...</option>' + sdrs.map(s => `<option value="${s.id}" ${s.id == current ? 'selected' : ''}>${s.name}</option>`).join('');
      });
    }

    function addAgendamento() {
      const container = document.getElementById('agendamentos-container');
      const newField = document.createElement('div');
      newField.className = 'dynamic-field';
      newField.innerHTML = `
        <select class="sdr-select" required>
          <option value="">Selecione SDR...</option>
          ${sdrs.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
        </select>
        <input type="number" class="quantidade" placeholder="Quantidade" min="1" required>
        <button type="button" class="remove-btn" onclick="removeField(this)">Remover</button>
      `;
      container.appendChild(newField);
    }

    function addReagendamento() {
      const container = document.getElementById('reagendamentos-container');
      const newField = document.createElement('div');
      newField.className = 'dynamic-field';
      newField.innerHTML = `
        <select class="sdr-select" required>
          <option value="">Selecione SDR...</option>
          ${sdrs.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
        </select>
        <input type="number" class="quantidade" placeholder="Quantidade" min="1" required>
        <button type="button" class="remove-btn" onclick="removeField(this)">Remover</button>
      `;
      container.appendChild(newField);
    }

    function removeField(button) {
      button.parentElement.remove();
    }

    function registerMovement(e) {
      e.preventDefault();
      const form = e.target;

      const agendamentos = [];
      document.querySelectorAll('#agendamentos-container .dynamic-field').forEach(field => {
        const sdrId = field.querySelector('.sdr-select').value;
        const qty = field.querySelector('.quantidade').value;
        if (sdrId && qty) agendamentos.push({ sdr_id: sdrId, quantidade: parseInt(qty) });
      });

      const reagendamentos = [];
      document.querySelectorAll('#reagendamentos-container .dynamic-field').forEach(field => {
        const sdrId = field.querySelector('.sdr-select').value;
        const qty = field.querySelector('.quantidade').value;
        if (sdrId && qty) reagendamentos.push({ sdr_id: sdrId, quantidade: parseInt(qty) });
      });

      const movement = {
        id: movements.length + 1,
        data: form.data.value,
        closer_id: parseInt(form.closer.value),
        origem_id: parseInt(form.origem.value),
        agendamentos: agendamentos,
        reunioes: parseInt(form.reunioes.value),
        reagendamentos: reagendamentos,
        quantidade_ganho: parseInt(form['quantidade-ganho'].value),
        valor_ganho: parseFloat(form['valor-ganho'].value),
        timestamp: new Date().toLocaleDateString('pt-BR'),
        expanded: false
      };

      movements.push(movement);
      localStorage.setItem('movements', JSON.stringify(movements));

      const msg = document.getElementById('success-msg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);

      form.reset();
      document.querySelector('input[type="date"]').valueAsDate = new Date();
      renderTable();
    }

    function toggleRow(id) {
      const movement = movements.find(m => m.id === id);
      if (movement) {
        movement.expanded = !movement.expanded;
        renderTable();
      }
    }

    function openEditModal(id) {
      editingMovement = movements.find(m => m.id === id);
      if (editingMovement) {
        document.getElementById('edit-data').value = editingMovement.data;
        document.getElementById('edit-reunioes').value = editingMovement.reunioes;
        document.getElementById('edit-quantidade-ganho').value = editingMovement.quantidade_ganho;
        document.getElementById('edit-valor-ganho').value = editingMovement.valor_ganho;
        document.getElementById('editModal').classList.add('show');
      }
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
      editingMovement = null;
    }

    function saveEdit(e) {
      e.preventDefault();
      if (editingMovement) {
        editingMovement.data = document.getElementById('edit-data').value;
        editingMovement.reunioes = parseInt(document.getElementById('edit-reunioes').value);
        editingMovement.quantidade_ganho = parseInt(document.getElementById('edit-quantidade-ganho').value);
        editingMovement.valor_ganho = parseFloat(document.getElementById('edit-valor-ganho').value);
        localStorage.setItem('movements', JSON.stringify(movements));
        closeEditModal();
        renderTable();
        showSuccessMsg();
      }
    }

    function deleteMovement(id) {
      if (confirm('Tem certeza?')) {
        movements = movements.filter(m => m.id !== id);
        localStorage.setItem('movements', JSON.stringify(movements));
        renderTable();
      }
    }

    function toggleHistorico() {
      historicoExpanded = !historicoExpanded;
      document.getElementById('historico-content').classList.toggle('show');
      document.getElementById('historico-icon').classList.toggle('open');
    }

    function applyFilters() {
      renderTable();
    }

    function clearFilters() {
      document.getElementById('filter-closer').value = '';
      document.getElementById('filter-date').value = '';
      renderTable();
    }

    function renderTable() {
      const filterCloserId = document.getElementById('filter-closer').value;
      const filterDate = document.getElementById('filter-date').value;

      let filtered = movements;
      if (filterCloserId) filtered = filtered.filter(m => m.closer_id == filterCloserId);
      if (filterDate) filtered = filtered.filter(m => m.data === filterDate);

      const tbody = document.getElementById('records-table');
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:#999;">Nenhum registro</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(m => {
        const closerName = closers.find(c => c.id == m.closer_id)?.name || '--';
        const origemName = origens.find(o => o.id == m.origem_id)?.name || '--';

        const agendStr = m.agendamentos.map(a => {
          const sdrName = sdrs.find(s => s.id == a.sdr_id)?.name || 'N/A';
          return `${sdrName}: ${a.quantidade}`;
        }).join(', ') || '--';

        const reagendStr = m.reagendamentos.map(r => {
          const sdrName = sdrs.find(s => s.id == r.sdr_id)?.name || 'N/A';
          return `${sdrName}: ${r.quantidade}`;
        }).join(', ') || '--';

        return `<tr class="expandable-row" onclick="toggleRow(${m.id})">
          <td class="expand-cell"><span class="expand-cell-icon ${m.expanded ? 'open' : ''}">▼</span></td>
          <td>${m.data}</td>
          <td>${closerName}</td>
          <td>${origemName}</td>
          <td>${agendStr}</td>
          <td>${m.reunioes}</td>
          <td>${reagendStr}</td>
          <td>${m.quantidade_ganho}</td>
          <td>R$ ${m.valor_ganho.toFixed(2)}</td>
          <td onclick="event.stopPropagation();">
            <div class="btn-group">
              <button class="edit-btn" onclick="openEditModal(${m.id})">Editar</button>
              <button class="delete-btn" onclick="deleteMovement(${m.id})">Deletar</button>
            </div>
          </td>
        </tr>
        <tr class="detail-row ${m.expanded ? 'show' : ''}" onclick="event.stopPropagation();">
          <td colspan="10">
            <div class="detail-content">
              <p><strong>Detalhes completos:</strong></p>
              <p>Closer: ${closerName}</p>
              <p>Origem: ${origemName}</p>
              <p>Agendamentos: ${agendStr}</p>
              <p>Reuniões: ${m.reunioes}</p>
              <p>Reagendamentos: ${reagendStr}</p>
              <p>Total Ganho: ${m.quantidade_ganho} unidades - R$ ${m.valor_ganho.toFixed(2)}</p>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    function showSuccessMsg() {
      const msg = document.getElementById('success-msg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
    }

    window.addEventListener('load', function() {
      document.querySelector('input[type="date"]').valueAsDate = new Date();
      loadData();
    });

    document.addEventListener('click', function(e) {
      const modal = document.getElementById('editModal');
      if (e.target === modal) closeEditModal();
    });
  </script>
</body>
</html>
